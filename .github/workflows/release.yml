name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versao (ex: 0.1.1)'
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          cat > bump.js << 'EOF'
          const fs = require('fs');
          const v = process.argv[2];
          const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          conf.version = v;
          fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          cargo = cargo.replace(/^version = "[^"]*"/m, `version = "${v}"`);
          fs.writeFileSync('src-tauri/Cargo.toml', cargo);
          EOF
          node bump.js "${{ inputs.version }}"
          rm bump.js

      - name: Commit e tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

  release:
    needs: bump
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ inputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Go API (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: api_go
        run: go build -o ../src-tauri/binaries/api-go-x86_64-pc-windows-msvc.exe .

      - name: Build Go API (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: api_go
        run: go build -o ../src-tauri/binaries/api-go-x86_64-unknown-linux-gnu .

      - name: Install frontend dependencies
        working-directory: view
        run: pnpm install

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-extracted
          $ffmpeg = Get-ChildItem -Path ffmpeg-extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries"
          Copy-Item $ffmpeg.FullName "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Download FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          wget -q https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          mkdir -p src-tauri/binaries
          cp ffmpeg-master-latest-linux64-gpl/bin/ffmpeg src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu

      - name: Build e publicar release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: "v${{ inputs.version }}"
          releaseName: "Family App v${{ inputs.version }}"
          releaseBody: "Nova versao do Family App"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
